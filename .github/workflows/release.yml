name: Release & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Deploy specific tag (e.g. v0.2.0). If empty, runs semantic-release."
        required: false

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/camiloespinoza/zeru/api
  WEB_IMAGE: ghcr.io/camiloespinoza/zeru/web

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.tag == '' || github.event.inputs.tag == null }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: read

    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT=$(pnpm release 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "Published release"; then
            VERSION=$(echo "$OUTPUT" | grep -oP 'Published release \K[0-9]+\.[0-9]+\.[0-9]+' || echo "")
            echo "new_release_published=true" >> "$GITHUB_OUTPUT"
            echo "new_release_version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "new_release_published=false" >> "$GITHUB_OUTPUT"
            echo "new_release_version=" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [release]
    if: |
      always() && (
        (needs.release.result == 'success' && needs.release.outputs.new_release_published == 'true') ||
        (needs.release.result == 'skipped' && github.event.inputs.tag != '')
      )
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.new_release_version && format('v{0}', needs.release.outputs.new_release_version) || github.event.inputs.tag || 'main' }}

      - name: Set image tag
        id: meta
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ -n "${{ needs.release.outputs.new_release_version }}" ]]; then
            TAG="v${{ needs.release.outputs.new_release_version }}"
          else
            TAG="sha-${GITHUB_SHA::7}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "IMAGE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Set up QEMU (multi-arch support)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.WEB_IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_REGISTER_TOKEN=${{ secrets.NEXT_PUBLIC_REGISTER_TOKEN }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 300s
          script: |
            set -euo pipefail
            IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            echo "Deploying tag: $IMAGE_TAG"

            # Inject/update AWS SES system credentials into .env.production
            ENV_FILE="/opt/zeru/.env.production"
            declare -A SES_VARS=(
              ["AWS_SES_REGION"]="${{ secrets.AWS_SES_REGION }}"
              ["AWS_SES_ACCESS_KEY_ID"]="${{ secrets.AWS_SES_ACCESS_KEY_ID }}"
              ["AWS_SES_SECRET_ACCESS_KEY"]="${{ secrets.AWS_SES_SECRET_ACCESS_KEY }}"
              ["AWS_SES_FROM_EMAIL"]="${{ secrets.AWS_SES_FROM_EMAIL }}"
            )
            for key in "${!SES_VARS[@]}"; do
              val="${SES_VARS[$key]}"
              if [[ -n "$val" ]]; then
                if grep -q "^${key}=" "$ENV_FILE" 2>/dev/null; then
                  sed -i "s|^${key}=.*|${key}=${val}|" "$ENV_FILE"
                else
                  echo "${key}=${val}" >> "$ENV_FILE"
                fi
              fi
            done

            # Authenticate to ghcr.io (required for private repositories)
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            bash /opt/zeru/scripts/deploy.sh "$IMAGE_TAG"
